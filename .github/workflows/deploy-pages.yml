name: Deploy static site to Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Allow the workflow to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; don't cancel an in-progress deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Strip non-site files
        # Keep the published surface identical to the previous legacy build,
        # which excluded dot-directories. Prevents publishing local tooling.
        run: rm -rf .claude

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        # upload-pages-artifact already excludes .git and .github
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

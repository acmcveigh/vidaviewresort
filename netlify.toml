[build]
  publish = "."
  functions = "netlify/functions"
  command = "cd netlify/functions && npm install"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
